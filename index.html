<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>يصير ونص! Ultimate v5 🎮⚔️</title>
    <style>
        :root {
            --ps-blue: #00439c;
            --xbox-green: #107c10;
            --neon-glow: #00f0ff;
            --bg-dark: #0a0f18;
            --card-bg: #131c2e;
            --btn-bg: #1c293d;
            --btn-hover: #273b54;
            --text-light: #e9edef;
            --text-muted: #8696a0;
            --danger: #ea0038;
            --primary-green: #00a884;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1a2639 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .screen {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
            justify-content: center;
            animation: fadeIn 0.2s ease-in-out;
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 1. الشاشة الرئيسية */
        .console-container {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 67, 156, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.05);
            border: 2px solid #1f2d44;
            text-align: center;
            width: 100%;
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #1f2d44;
            padding-bottom: 10px;
        }

        .console-title {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--neon-glow), var(--ps-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .console-badge {
            background-color: var(--xbox-green);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(16, 124, 16, 0.5);
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }
