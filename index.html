<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قصف جبهات - GAME MODE 🎮</title>
    <style>
        :root {
            --ps-blue: #00439c;
            --xbox-green: #107c10;
            --neon-glow: #00f0ff;
            --bg-dark: #0a0f18;
            --card-bg: #131c2e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1a2639 0%, var(--bg-dark) 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        /* حاوية اللعبة على ستايل الكونسول */
        .console-container {
            width: 100%;
            max-width: 420px;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0, 67, 156, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.05);
            border: 2px solid #1f2d44;
            text-align: center;
        }

        /* الـ Header المستوحى من الـ Gaming */
        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #1f2d44;
            padding-bottom: 10px;
        }

        .console-title {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #00f0ff, #00439c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .console-badge {
            background-color: var(--xbox-green);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(16, 124, 16, 0.5);
        }

        /* شاشة عرض القصف (تلفزيون الألعاب) */
        .screen-display {
            background: linear-gradient(145deg, #070d14, #0f1724);
            border: 2px solid #00f0ff;
            padding: 20px;
            border-radius: 12px;
            min-height: 70px;
            font-size: 17px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
            color: #e2e8f0;
            line-height: 1.5;
        }

        /* مجموعة الإدخال والكتابة */
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
